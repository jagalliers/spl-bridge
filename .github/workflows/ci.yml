name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests + coverage
        # The coverage gate (>=80%) lives in pyproject.toml under
        # [tool.coverage.report]; --cov here is what activates the
        # measurement and lets pytest-cov enforce that threshold.
        # We deliberately exclude the integration and safety suites
        # (they need a live splunkd) and the opt-in PTY/Docker
        # suites, which are gated by their own env vars.
        env:
          SPLUNK_INTEGRATION: "0"
        run: |
          pytest -q \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_safety.py \
            --ignore=tests/test_docker.py \
            --ignore=tests/test_wizard_pty_scenarios.py \
            --cov=spl_bridge \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
