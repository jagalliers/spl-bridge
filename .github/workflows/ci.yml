name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests + coverage
        # The coverage gate (>=80%) lives in pyproject.toml under
        # [tool.coverage.report]; --cov here is what activates the
        # measurement and lets pytest-cov enforce that threshold.
        # We deliberately exclude the integration and safety suites
        # (they need a live splunkd) and the opt-in PTY/Docker
        # suites, which are gated by their own env vars.
        env:
          SPLUNK_INTEGRATION: "0"
        run: |
          pytest -q \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_safety.py \
            --ignore=tests/test_docker.py \
            --ignore=tests/test_wizard_pty_scenarios.py \
            --cov=spl_bridge \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
