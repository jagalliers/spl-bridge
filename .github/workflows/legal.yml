name: Legal hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    # Reject unsigned commits on PRs. Pinned by SHA per the project's
    # supply-chain rule (see L-7 in SECURITY_AUDIT.md). SHAs are
    # cross-checked against the upstream tag refs at the listed version.
    #
    # Skipped on dependabot PRs: dependabot commits are authenticated by
    # GitHub's webhook signature, not by Signed-off-by, and forcing DCO
    # on bot-authored PRs blocks every dependency bump for no real gain.
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: tim-actions/get-pr-commits@198af03565609bb4ed924d1260247b4881f09e7d # v1.3.1
        id: pr-commits
        with:
          token: ${{ github.token }}
      - uses: tim-actions/dco@f2279e6e62d5a7d9115b0cb8e837b777b1b02e21 # v1.1.0
        with:
          commits: ${{ steps.pr-commits.outputs.commits }}

  provenance-and-license:
    name: provenance + dependency licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # Pinned to 3.11 to mirror the runtime Python ABI shipped by
          # the distroless image (gcr.io/distroless/python3-debian12).
          # If you bump this, also bump the builder stage in Dockerfile.
          python-version: "3.11"

      # The Docker runtime lockfile is the authoritative source of
      # names + versions for THIRD_PARTY_NOTICES.txt (it's what
      # actually ships in the container image). We install from it
      # under --require-hashes so the env exactly matches the lockfile,
      # then add the project itself with --no-deps so pip never
      # re-resolves runtime deps and silently drifts away from the
      # pin set. Order matters: violating it defeats the lockfile.
      - name: Install pinned runtime closure (lockfile is canonical)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r docker/requirements-runtime.txt
          python -m pip install --no-deps -e ".[keyring]"
          python -m pip install pip-licenses

      # Re-derive THIRD_PARTY_NOTICES.txt from the lockfile-resolved
      # closure and fail the build if it has drifted from the committed
      # copy. Operators bumping a runtime dependency must regenerate
      # the file in the same PR (see CONTRIBUTING.md).
      - name: Regenerate aggregated third-party notices from lockfile
        run: |
          python scripts/generate_third_party_notices.py \
            --docker-lockfile docker/requirements-runtime.txt \
            > /tmp/THIRD_PARTY_NOTICES.regen
      - name: Diff against committed THIRD_PARTY_NOTICES.txt
        run: |
          if ! diff -u THIRD_PARTY_NOTICES.txt /tmp/THIRD_PARTY_NOTICES.regen; then
            echo "::error::THIRD_PARTY_NOTICES.txt is stale. Regenerate with:"
            echo "::error::  pip install --require-hashes -r docker/requirements-runtime.txt"
            echo "::error::  pip install --no-deps -e \".[keyring]\""
            echo "::error::  pip install pip-licenses"
            echo "::error::  python scripts/generate_third_party_notices.py > THIRD_PARTY_NOTICES.txt"
            exit 1
          fi

      # Reject any runtime dependency whose license is GPL-family or
      # otherwise incompatible with Apache-2.0 redistribution. The
      # allowlist below is intentionally narrow.
      - name: Enforce runtime dependency license allowlist
        run: |
          pip-licenses --format=json --with-license-file --no-license-path \
            > /tmp/licenses.json
          python - <<'PY'
          import json, sys, re
          ALLOWED = {
              "Apache-2.0",
              "Apache Software License",
              "Apache License 2.0",
              "BSD-3-Clause",
              "BSD-2-Clause",
              "BSD License",
              "MIT",
              "MIT License",
              "MPL-2.0",
              "Mozilla Public License 2.0 (MPL 2.0)",
              "ISC",
              "ISC License",
              "PSF-2.0",
              "Python Software Foundation License",
              "Apache-2.0 OR BSD-3-Clause",
              "Unlicense",
              "Public Domain",
              "Apache License, Version 2.0",
          }
          # Tolerated transitives that shipped with a vague license
          # string but are tracked by the maintainers.
          KNOWN_OK = {"pyasn1", "pyasn1-modules"}

          data = json.load(open("/tmp/licenses.json"))
          violations = []
          for pkg in data:
              lic = pkg.get("License", "")
              name = pkg.get("Name", "")
              if name in KNOWN_OK:
                  continue
              # Permit composite SPDX expressions when each token is
              # individually allowed.
              tokens = re.split(r"\s+(?:OR|AND)\s+", lic.strip())
              if all(t.strip() in ALLOWED for t in tokens):
                  continue
              violations.append((name, pkg.get("Version", ""), lic))
          if violations:
              for n, v, lic in violations:
                  print(f"::error::Disallowed license for {n}=={v}: {lic}")
              sys.exit(1)
          print(f"OK: {len(data)} packages all under permissive licenses.")
          PY

      # Catch accidental re-introduction of upstream-namespaced
      # identifiers in our data files (Phase A2 of the legal review).
      - name: Block re-introduction of CSCL upstream namespace
        run: |
          if grep -REn 'splunk_mcp_app_builtin' spl_bridge/ 2>/dev/null; then
            echo "::error::Found 'splunk_mcp_app_builtin' identifier."
            echo "::error::That namespace belongs to the CSCL-licensed upstream."
            echo "::error::Use the project-local 'spl_bridge:builtin:*' namespace."
            exit 1
          fi

      # Belt-and-braces trademark and prior-name sanity check.
      # The only allowed location for these identifiers is this
      # workflow file (the regex itself). Any other tracked file
      # mentioning these strings is a regression.
      - name: Block accidental product naming with the Splunk mark or prior names
        run: |
          # Allow nominative phrases ("Splunk REST", "Splunk Enterprise"
          # etc.) but block module / package / CLI surfaces that lead
          # with "Splunk" -- those are forbidden by the trademark
          # usage guidelines and were the headline finding of the
          # legal review. Also block the previous interim project name.
          BAD=$(grep -REn '\b(splunk[_-]mcp|splunk_mcp_app|mcp[_-]bridge[_-]for[_-]splunk)\b' \
                  --include='*.py' --include='*.toml' \
                  --include='*.md' --include='*.json' \
                  --include='Dockerfile*' --include='*.yml' \
                  --include='*.yaml' --include='*.sh' \
                  --include='*.txt' --include='*.cfg' \
                  -- . 2>/dev/null \
                | grep -v -E '(legal\.yml)' \
                || true)
          if [ -n "$BAD" ]; then
            echo "::error::Found a forbidden product-name identifier in tracked files:"
            echo "$BAD"
            exit 1
          fi
